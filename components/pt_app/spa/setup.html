<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LabelSis setup</title>
<style>
:root { --bg:#0d1117; --fg:#e6edf3; --muted:#8b949e; --accent:#58a6ff; --ok:#3fb950; --err:#f85149; --panel:#161b22; --line:#30363d; }
* { box-sizing: border-box; }
body { margin:0; font:14px/1.4 -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }
header { padding:1rem; border-bottom:1px solid var(--line); }
h1 { margin:0; font-size:1.1rem; font-weight:600; }
main { max-width:480px; margin:0 auto; padding:1rem; display:flex; flex-direction:column; gap:1rem; }
.panel { background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:1rem; }
.panel h2 { margin:0 0 .5rem; font-size:.85rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
.row { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; margin-bottom:.5rem; }
label { font-size:.85rem; color:var(--muted); min-width:70px; }
input[type=text], input[type=password], select { background:#0d1117; color:var(--fg); border:1px solid var(--line); border-radius:4px; padding:.5rem; font:inherit; flex:1; min-width:160px; }
button { background:var(--accent); color:#fff; border:0; border-radius:4px; padding:.6rem 1rem; font:inherit; font-weight:600; cursor:pointer; }
button:disabled { background:var(--muted); cursor:not-allowed; }
button.secondary { background:transparent; color:var(--accent); border:1px solid var(--accent); }
.muted { color:var(--muted); font-size:.85rem; }
.kv-ok  { color:var(--ok); }
.kv-err { color:var(--err); }
#log { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:.8rem; color:var(--muted); margin-top:.5rem; min-height:1.4em; }
</style>
</head>
<body>
<header><h1>LabelSis setup</h1></header>
<main>
  <div class="panel">
    <h2>Wi-Fi</h2>
    <p class="muted">Pick a network and enter the password. The device will reboot and join your Wi-Fi.</p>
    <div class="row">
      <label>network</label>
      <select id="ssid-select"><option value="">(scanning…)</option></select>
      <button id="rescan" class="secondary">rescan</button>
    </div>
    <div class="row">
      <label>or type</label>
      <input id="ssid-text" type="text" placeholder="SSID">
    </div>
    <div class="row">
      <label>password</label>
      <input id="password" type="password" placeholder="WPA2 passphrase">
      <button id="reveal" class="secondary" type="button">show</button>
    </div>
    <div class="row">
      <label>confirm</label>
      <input id="password2" type="password" placeholder="re-enter">
    </div>
    <div class="row">
      <button id="save">save &amp; reboot</button>
    </div>
    <div id="log"></div>
  </div>
</main>
<script>
"use strict";

async function scan() {
  const sel = document.getElementById("ssid-select");
  sel.innerHTML = "<option value=''>(scanning…)</option>";
  try {
    const r = await fetch("/api/scan");
    const j = await r.json();
    sel.innerHTML = "";
    if (!j.ok || !j.networks.length) {
      sel.innerHTML = "<option value=''>(no networks found)</option>";
      return;
    }
    /* dedupe by SSID, keep best RSSI */
    const best = {};
    for (const n of j.networks) {
      if (!n.ssid) continue;
      if (!best[n.ssid] || best[n.ssid].rssi < n.rssi) best[n.ssid] = n;
    }
    const list = Object.values(best).sort((a,b) => b.rssi - a.rssi);
    sel.innerHTML = "<option value=''>(pick or type below)</option>";
    for (const n of list) {
      const o = document.createElement("option");
      o.value = n.ssid;
      const lock = n.auth === 0 ? "" : "🔒 ";
      o.textContent = `${lock}${n.ssid}  (${n.rssi} dBm)`;
      sel.appendChild(o);
    }
  } catch (e) {
    sel.innerHTML = "<option value=''>(scan failed)</option>";
  }
}

async function save() {
  const ssid = document.getElementById("ssid-text").value.trim()
            || document.getElementById("ssid-select").value;
  const password  = document.getElementById("password").value;
  const password2 = document.getElementById("password2").value;
  if (!ssid) { log("pick or type an SSID first", false); return; }
  if (password !== password2) { log("passwords don't match", false); return; }
  const btn = document.getElementById("save");
  btn.disabled = true;
  log("saving…");
  try {
    const r = await fetch("/api/setup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ssid, password }),
    });
    const j = await r.json();
    if (j.ok) {
      log("saved - rebooting. reconnect to your Wi-Fi and try http://labelsis.local/", true);
    } else {
      log(`error: ${j.error}`, false);
      btn.disabled = false;
    }
  } catch (e) {
    log(`network: ${e.message}`, false);
    btn.disabled = false;
  }
}

function log(msg, ok) {
  const el = document.getElementById("log");
  el.textContent = msg;
  el.className = ok === undefined ? "" : (ok ? "kv-ok" : "kv-err");
}

document.getElementById("rescan").addEventListener("click", scan);
document.getElementById("save").addEventListener("click", save);
document.getElementById("ssid-select").addEventListener("change", e => {
  document.getElementById("ssid-text").value = e.target.value;
});

let revealed = false;
document.getElementById("reveal").addEventListener("click", () => {
  revealed = !revealed;
  const t = revealed ? "text" : "password";
  document.getElementById("password").type  = t;
  document.getElementById("password2").type = t;
  document.getElementById("reveal").textContent = revealed ? "hide" : "show";
});

scan();
</script>
</body>
</html>
